<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FFFFFF;
            color: #172A3A;
            width: 1280px;
            height: 720px;
            overflow: hidden;
        }
        .text-teal { color: #508991; }
        .bg-teal { background-color: #508991; }
        .text-deep { color: #004346; }
        .bg-deep { background-color: #004346; }
        .text-accent { color: #75DDDD; }
        .bg-accent { background-color: #75DDDD; }
        
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 48px 1fr;
            gap: 20px;
            height: 100%;
            align-items: stretch;
        }
        
        .panel-base {
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .panel-v0 {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
        }
        
        .panel-v1 {
            background-color: #F0FDFA; /* Light Teal Tint */
            border: 2px solid #508991;
            box-shadow: 0 10px 15px -3px rgba(80, 137, 145, 0.15);
        }

        .img-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 8px;
            margin: 8px;
            border: 1px solid #E5E7EB;
            overflow: hidden;
            position: relative;
        }
        
        .img-content {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .img-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #E2E8F0;
            color: #64748B;
        }

        .center-axis {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }
        
        .arrow-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #FFFFFF;
            border: 2px solid #508991;
            color: #508991;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    
        .text-primary { color: #508991; }

        .panel-v0 {
            transition: box-shadow 0.25s ease;
        }
        .panel-v0:hover {
            box-shadow: 0 10px 28px rgba(23, 42, 58, 0.1);
        }
        .panel-v1 {
            transition: box-shadow 0.25s ease;
        }
        .panel-v1:hover {
            box-shadow: 0 12px 32px rgba(80, 137, 145, 0.2);
        }
        .img-box {
            transition: all 0.25s ease;
        }
        .img-box:hover {
            box-shadow: 0 4px 12px rgba(0, 67, 70, 0.1);
            border-color: #75DDDD;
        }
        .arrow-circle {
            transition: all 0.2s ease;
            cursor: default;
        }
        .arrow-circle:hover {
            background-color: #508991;
            color: #FFFFFF;
            border-color: #508991;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="overflow-hidden flex flex-col p-6 relative">
<!-- Header -->
<div class="flex flex-col mb-4 z-10">
  <div class="flex items-center mb-2">
    <span class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-deep text-white">Performance Comparison</span>
    <div class="h-px bg-gray-200 flex-grow ml-3"></div>
  </div>
  <div class="flex justify-between items-end">
    <div>
      <h1 class="text-4xl font-black text-[#172A3A]">모델 성능 심층 비교</h1>
      <p class="text-primary text-lg font-medium mt-1">정제 전후 F1 Curve와 혼동 행렬 변화를 비교합니다.</p>
    </div>
    <div class="text-right">
      <div class="inline-flex items-center bg-[#E0F2F1] text-[#004346] px-4 py-2 rounded-lg border border-[#004346]">
        <span class="text-sm font-bold mr-2">Public Score</span>
        <span class="text-2xl font-black">0.900 <i class="fas fa-arrow-right text-[#508991] mx-2 text-sm"></i> 0.961</span>
      </div>
    </div>
  </div>
</div>
<!-- Main Content -->
<div class="flex-grow min-h-0 z-10 compare-grid">
<!-- Left: v0 (Before) -->
<div class="panel-base panel-v0">
<div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
<h3 class="font-bold text-gray-600 text-lg">v0: Initial (Nano)</h3>
<span class="text-xs bg-white px-2 py-1 rounded border border-gray-300 text-gray-500 font-mono">Raw Data</span>
</div>
<!-- F1 Curve -->
<div class="img-box">
<span class="img-tag">F1 Curve</span>
<img src="image/01_1초기 모델 시각화 자료_F1커브.png" alt="v0 F1 Curve" class="img-content">
</div>
<!-- Confusion Matrix -->
<div class="img-box">
<span class="img-tag">Confusion Matrix</span>
<img src="image/02_1초기 모델 시각화 자료_혼동행렬.png" alt="v0 Confusion Matrix" class="img-content">
</div>
</div>

<!-- Center: Axis -->
<div class="center-axis relative">
<div class="absolute w-[2px] h-[90%] bg-gray-200 z-0"></div>
<div class="arrow-circle bg-white"><i class="fas fa-angle-right"></i></div>
<div class="arrow-circle bg-[#E0F2F1] border-[#004346] text-[#004346]"><i class="fas fa-angle-right"></i></div>
</div>

<!-- Right: v1 (After) -->
<div class="panel-base panel-v1">
<div class="bg-[#E0F2F1] px-4 py-3 border-b border-[#508991] flex justify-between items-center">
<h3 class="font-bold text-[#004346] text-lg">v1: Baseline (Small)</h3>
<span class="text-xs bg-white px-2 py-1 rounded border border-[#508991] text-[#004346] font-mono font-bold">Clean Data</span>
</div>
<!-- F1 Curve -->
<div class="img-box border-[#75DDDD]">
<span class="img-tag text-[#004346] border-[#75DDDD]">F1 Curve</span>
<img src="image/01_2베이스라인 모델 시각화 자료_F1커브.png" alt="v1 F1 Curve" class="img-content">
</div>
<!-- Confusion Matrix -->
<div class="img-box border-[#75DDDD]">
<span class="img-tag text-[#004346] border-[#75DDDD]">Confusion Matrix</span>
<img src="image/02_2베이스라인 모델 시각화 자료_혼동행렬.png" alt="v1 Confusion Matrix" class="img-content">
</div>
</div>
</div>

<!-- Footer Note -->
<div class="mt-2 text-center">
<p class="text-xs text-gray-500 bg-gray-50 inline-block px-4 py-1 rounded-full border border-gray-200">
<i class="fas fa-info-circle mr-1 text-[#508991]"></i>
        좌측: 데이터 노이즈로 인한 불안정한 학습 곡선 / 우측: 정제 후 안정적인 수렴과 대각선(TP) 선명도 증가
    </p>
</div>

    <script src="./presentation-nav.js"></script>
</body>
</html>
