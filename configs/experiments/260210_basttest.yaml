# performance-tuned: YOLO11s, stronger aug, longer schedule
_base_: "../base.yaml"

model:
  architecture: "yolo11s"
  pretrained: "yolo11s.pt"

train:
  epochs: 100
  imgsz: 768
  batch: 16
  optimizer: "AdamW"
  lr0: 0.01
  lrf: 0.1
  cos_lr: true
  label_smoothing: 0.05
  patience: 40

  # augmentation
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1

external_data:
  enabled: true
  sources:
    - name: "external_combined"
      images_dir: "data/raw/external/combined/images"
      annotations_dir: "data/raw/external/combined/annotations"
      recursive: true
  dedup:
    dedup_against_train: true
