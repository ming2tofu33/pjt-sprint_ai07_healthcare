_base_: "../base.yaml"

submission:
  conf: 0.001
  nms_iou: 0.60
  min_conf: 0.0
  max_det_per_image: 4
  augment: false
  debug:
    enabled: false
    sample_size: 12
    seed: 42

  ensemble:
    enabled: true
    method: "wbf"
    strict_category_map: true
    runs:
      - run_name: "y11m_ext_balanced_v1"
        weight_tag: "competition_best"
        conf: 0.001
        nms_iou: 0.65
        imgsz: 896
        augment: false
        model_weight: 1.35
      - run_name: "yolov8s_baseline_v1"
        weight_tag: "competition_best"
        conf: 0.001
        nms_iou: 0.60
        imgsz: 768
        augment: false
        model_weight: 1.00
    wbf:
      iou_thr: 0.55
      skip_box_thr: 0.0001
      conf_type: "avg"
